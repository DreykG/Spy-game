<main class="mobile-container">
  @if (currentScreen == 'menu'){
    <app-main-menu (onStartLocal)="changeScreen('setup')"></app-main-menu>
  }
  
  @if (currentScreen === 'setup') {
    <app-game-setup 
      (onBack)="changeScreen('menu')" 
      (onGameReady)="changeScreen('play')">
    </app-game-setup>
  }

  @if (currentScreen === 'play') {
    <app-game-play (onGameEnd)="changeScreen('menu')"></app-game-play>
  }
</main>
